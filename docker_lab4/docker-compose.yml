services:
  # Service 1: Train the model
  model-training:
    image: python:3.10-slim
    container_name: wine_trainer
    working_dir: /app
    volumes:
      - ./src:/app/src
      - ./requirements.txt:/app/requirements.txt
      - model_exchange:/exchange
    command: >
      sh -c "pip install -r requirements.txt &&
             python src/model_training.py &&
             cp wine_gb_model.joblib /exchange/wine_gb_model.joblib"

  # Service 2: Serve the model
  serving:
    image: python:3.10-slim
    container_name: wine_serving
    working_dir: /app
    ports:
      - "4000:4000"
    volumes:
      - ./src:/app/src
      - ./requirements.txt:/app/requirements.txt
      - ./src/templates:/app/templates
      - ./src/statics:/app/statics
      - model_exchange:/exchange
    depends_on:
      model-training:
        condition: service_completed_successfully
    command: >
      sh -c "pip install -r requirements.txt &&
             cp /exchange/wine_gb_model.joblib ./wine_gb_model.joblib &&
             python src/main.py"

volumes:
  model_exchange:
